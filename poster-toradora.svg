:root {
    --bg: #ffffff;
    --panel: #ffffff;
    --line: #d9d9d9;
    --text: #111111;
    --muted: #555555;
    --primary: #222222;
    --primary-hover: #000000;
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: Arial, Helvetica, sans-serif;
    line-height: 1.5;
}

img {
    display: block;
    max-width: 100%;
}

button,
input,
select {
    font: inherit;
}

button {
    cursor: pointer;
}

input,
select {
    width: 100%;
    padding: 0.7rem;
    border: 1px solid var(--line);
    border-radius: 4px;
    background: #fff;
    color: var(--text);
}

input:focus,
select:focus,
button:focus,
a:focus {
    outline: 2px solid #777;
    outline-offset: 2px;
}

.page-shell {
    width: min(900px, calc(100% - 2rem));
    margin: 0 auto;
    padding: 1rem 0 2rem;
}

.site-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 1rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--line);
}

.brand {
    color: inherit;
    text-decoration: none;
}

.brand h1 {
    font-size: 1.4rem;
}

.site-nav {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
}

.site-nav a,
.text-link {
    color: var(--text);
    text-decoration: none;
}

.site-nav a:hover,
.text-link:hover,
.ghost-link:hover {
    text-decoration: underline;
}

.main-content {
    display: grid;
    gap: 1rem;
    padding-top: 1rem;
}

.section-block,
.anime-card,
.empty-state,
.faq-item {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 6px;
}

.section-block,
.anime-card,
.empty-state {
    padding: 1rem;
}

.section-heading {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 1rem;
    margin-bottom: 0.75rem;
}

.simple-heading {
    margin-bottom: 0.5rem;
}

.section-note,
.anime-card p,
.detail-copy p,
.empty-state p,
.faq-item p {
    color: var(--muted);
}

.card-actions,
.meta-row,
.filter-buttons {
    display: flex;
    gap: 0.6rem;
    flex-wrap: wrap;
}

.top-gap {
    margin-top: 0.75rem;
}

.meta-row span {
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 0.25rem 0.6rem;
    font-size: 0.9rem;
}

.primary-link,
.secondary-link,
.ghost-link,
.save-button {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 40px;
    padding: 0.65rem 0.9rem;
    border-radius: 4px;
    text-decoration: none;
    border: 1px solid var(--line);
    background: #fff;
    color: var(--text);
}

.primary-link {
    background: var(--primary);
    color: #fff;
    border-color: var(--primary);
}

.primary-link:hover {
    background: var(--primary-hover);
}

.button-reset {
    border: none;
}

.simple-list {
    display: grid;
    gap: 0.75rem;
}

.anime-card-body,
.simple-detail-copy {
    display: grid;
    gap: 0.6rem;
}

.filter-form {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 0.75rem;
    align-items: end;
    margin-top: 0.75rem;
}

.filter-form label {
    display: grid;
    gap: 0.35rem;
    font-weight: 700;
}

.faq-list {
    display: grid;
    gap: 0.75rem;
}

.faq-item {
    padding: 0.9rem;
}

.faq-item summary {
    cursor: pointer;
    font-weight: 700;
}

.faq-item p {
    padding-top: 0.6rem;
}

.empty-state {
    text-align: center;
}

.compact-top {
    padding-top: 1rem;
}

.sr-only {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
    border: 0;
}

@media (max-width: 760px) {
    .site-header,
    .filter-form {
        grid-template-columns: 1fr;
        display: grid;
    }

    .site-nav {
        gap: 0.75rem;
    }
}
